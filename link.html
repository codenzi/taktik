<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taktik Koç - Uygulamayı İndir</title>
    
    <meta property="og:title" content="Taktik Koç - Sınavlara Hazırlık">
    <meta property="og:description" content="Taktik Koç uygulamasını hemen indir ve hedeflerine ulaş.">
    
    <script>
        // Timeout'u kontrol edebilmek için global bir değişken tanımlıyoruz
        var fallbackTimer;

        function redirect(isManualClick = false) {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            
            // Modern iPad'ler kendini Mac olarak tanıtır, maxTouchPoints ile yakalıyoruz
            var isIOS = /iPad|iPhone|iPod/.test(userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            var isAndroid = /android/i.test(userAgent);

            if (isIOS) {
                // Doğrudan App Store uygulamasını açmaya zorlar
                window.location.href = "itms-apps://apps.apple.com/app/id6755930518";
                
                // Eğer cihazda App Store açılamazsa (veya tarayıcı engellerse) normal web linkine düş
                fallbackTimer = setTimeout(function() {
                    window.location.href = "https://apps.apple.com/tr/app/taktik-ko%C3%A7-yks-lgs-kpss-ags/id6755930518";
                }, 1500);
                return;
            }

            if (isAndroid) {
                // Doğrudan Google Play uygulamasını açmaya zorlar (Intent kullanımı)
                window.location.href = "intent://details?id=com.codenzi.taktik#Intent;scheme=market;package=com.android.vending;end;";
                
                // Intent başarısız olursa normal Play Store web linkine düş
                fallbackTimer = setTimeout(function() {
                    window.location.href = "https://play.google.com/store/apps/details?id=com.codenzi.taktik";
                }, 1500);
                return;
            }

            // Masaüstü veya tespit edilemeyen cihazlar
            if (!isManualClick) {
                window.location.replace("https://taktik.codenzi.com");
            }
        }

        // Sayfa yüklendiğinde otomatik yönlendirmeyi dene
        window.onload = function() {
            redirect(false);
        };

        // YENİ EKLENEN KISIM: Page Visibility API
        // Eğer mağaza başarıyla açılırsa cihazın tarayıcısı arka plana düşer (hidden olur).
        // Bu durumda gereksiz yere web mağazasına yönlenmeyi iptal ediyoruz.
        document.addEventListener("visibilitychange", function() {
            if (document.hidden && fallbackTimer) {
                clearTimeout(fallbackTimer);
            }
        });
    </script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            padding-top: 80px; 
            background-color: #f8f9fa; 
            color: #333;
        }
        h2 { font-size: 24px; margin-bottom: 10px; }
        p { font-size: 16px; color: #666; margin-bottom: 30px; }
        .btn { 
            display: inline-block; 
            padding: 14px 32px; 
            font-size: 18px; 
            color: white; 
            background-color: #007bff; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0, 123, 255, 0.2);
            transition: background-color 0.3s;
        }
        .btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <h2>Taktik Koç Mağazaya Yönlendiriliyor...</h2>
    <p>Mağaza uygulaması otomatik açılmazsa, aşağıdaki butona tıkla.</p>
    
    <a href="javascript:void(0);" onclick="redirect(true)" class="btn">Mağazaya Git</a>
</body>
</html>
